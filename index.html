<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System</title>
<style>
  body {
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #4e54c8, #8f94fb);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 20px;
  }
  .container {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  label {
    display: block;
    margin-top: 10px;
  }
  input {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    margin-top: 5px;
  }
  button {
    width: 100%;
    background: #6c63ff;
    border: none;
    color: #fff;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 15px;
    font-weight: bold;
  }
  button:hover {
    background: #574bff;
  }
  .output {
    margin-top: 25px;
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 10px;
  }
  .book-item {
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding: 5px 0;
  }
</style>
</head>
<body>

<h1>📚 Library Management System</h1>

<div class="container">
  <label>Book ID</label>
  <input type="number" id="bookId" placeholder="Enter Book ID">

  <label>Title</label>
  <input type="text" id="title" placeholder="Enter Book Title">

  <label>Author</label>
  <input type="text" id="author" placeholder="Enter Author Name">

  <button onclick="addBook()">➕ Add Book</button>
  <button onclick="displayBooks()">📖 Display Books</button>
  <button onclick="searchBook()">🔍 Search Book</button>
  <button onclick="deleteBook()">🗑️ Delete Book</button>
</div>

<div class="output" id="output"></div>

<script>
  // Linked List structure simulated using an array
  let library = [];

  function addBook() {
    const id = document.getElementById("bookId").value;
    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();

    if (!id || !title || !author) {
      showMessage("⚠️ Please fill all fields.");
      return;
    }

    const exists = library.find(book => book.id == id);
    if (exists) {
      showMessage("❌ Book ID already exists!");
      return;
    }

    library.push({ id, title, author });
    showMessage("✅ Book added successfully!");
    clearFields();
  }

  function displayBooks() {
    const output = document.getElementById("output");
    if (library.length === 0) {
      output.innerHTML = "<p>📂 No books in the library.</p>";
      return;
    }
    let html = "<h3>--- Library Books ---</h3>";
    library.forEach(book => {
      html += `<div class="book-item">
        <strong>ID:</strong> ${book.id} | 
        <strong>Title:</strong> ${book.title} | 
        <strong>Author:</strong> ${book.author}
      </div>`;
    });
    output.innerHTML = html;
  }

  function searchBook() {
    const id = document.getElementById("bookId").value;
    if (!id) {
      showMessage("⚠️ Please enter a Book ID to search.");
      return;
    }
    const book = library.find(b => b.id == id);
    if (book) {
      showMessage(`🔎 Found -> ID: ${book.id}, Title: ${book.title}, Author: ${book.author}`);
    } else {
      showMessage("❌ Book not found.");
    }
  }

  function deleteBook() {
    const id = document.getElementById("bookId").value;
    if (!id) {
      showMessage("⚠️ Please enter Book ID to delete.");
      return;
    }
    const index = library.findIndex(b => b.id == id);
    if (index !== -1) {
      library.splice(index, 1);
      showMessage("🗑️ Book deleted.");
    } else {
      showMessage("❌ Book ID not found.");
    }
  }

  function showMessage(msg) {
    document.getElementById("output").innerHTML = `<p>${msg}</p>`;
  }

  function clearFields() {
    document.getElementById("bookId").value = "";
    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
  }
</script>

</body>
</html>
